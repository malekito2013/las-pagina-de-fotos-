<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Portafolio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --bg: #1C1C1E;
    --bg2: #2A2A2D;
    --bg3: #333336;
    --text: #F0EBE3;
    --text-muted: #9A9590;
    --radius: 10px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 3rem 2rem 2rem;
    text-align: center;
    border-bottom: 1px solid #333;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 1.2rem auto 0;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .subtitle {
    font-size: 0.95rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 300;
  }

  /* NAV CATEGORIAS */
  .cats {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    padding: 1.5rem 2rem;
    border-bottom: 1px solid #2e2e2e;
  }
  .cat-btn {
    background: transparent;
    border: 1px solid #444;
    color: var(--text-muted);
    padding: 0.4rem 1rem;
    border-radius: 999px;
    font-size: 0.82rem;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .cat-btn:hover, .cat-btn.active {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* TOOLBAR */
  .toolbar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 2rem 0;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .btn-add {
    background: var(--gold);
    color: #1C1C1E;
    border: none;
    padding: 0.6rem 1.4rem;
    border-radius: var(--radius);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .btn-add:hover { background: var(--gold-light); }
  .btn-add svg { width: 16px; height: 16px; }

  /* GRID */
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  /* CARD */
  .card {
    background: var(--bg2);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid #333;
    transition: transform 0.25s, border-color 0.25s;
    position: relative;
  }
  .card:hover { transform: translateY(-4px); border-color: var(--gold); }

  .card-img-wrap {
    position: relative;
    overflow: hidden;
    aspect-ratio: 4/3;
    background: var(--bg3);
    cursor: pointer;
  }
  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s;
  }
  .card:hover .card-img-wrap img { transform: scale(1.04); }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(201,168,76,0.18);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card:hover .card-overlay { opacity: 1; }
  .overlay-icon {
    width: 48px; height: 48px;
    background: rgba(201,168,76,0.85);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .overlay-icon svg { width: 22px; height: 22px; color: #1C1C1E; }

  .card-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    cursor: pointer;
    color: var(--text-muted);
    transition: color 0.2s;
  }
  .card-placeholder:hover { color: var(--gold); }
  .card-placeholder svg { width: 40px; height: 40px; }
  .card-placeholder span { font-size: 0.8rem; }

  .card-body { padding: 1rem 1.1rem 1.2rem; }
  .card-cat {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 0.3rem;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.3rem;
    line-height: 1.3;
  }
  .card-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .card-actions {
    display: flex;
    gap: 0.5rem;
    padding: 0 1.1rem 1rem;
  }
  .btn-edit, .btn-delete {
    font-size: 0.75rem;
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    border: 1px solid #444;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.2s;
  }
  .btn-edit:hover { border-color: var(--gold); color: var(--gold); }
  .btn-delete:hover { border-color: #c0392b; color: #e74c3c; }

  /* EMPTY STATE */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-muted);
  }
  .empty svg { width: 56px; height: 56px; opacity: 0.3; margin-bottom: 1rem; }
  .empty p { font-size: 1rem; margin-bottom: 0.4rem; }
  .empty small { font-size: 0.82rem; }

  /* MODAL AGREGAR/EDITAR */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid #444;
    border-radius: 14px;
    padding: 2rem;
    width: 100%;
    max-width: 460px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 1.5rem;
    color: var(--text);
  }
  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--gold);
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field select option { background: var(--bg3); }

  .img-preview {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--bg3);
    border: 2px dashed #444;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
    margin-bottom: 0.5rem;
  }
  .img-preview:hover { border-color: var(--gold); }
  .img-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }
  .img-preview-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    color: var(--text-muted);
    font-size: 0.82rem;
    pointer-events: none;
  }
  .img-preview-label svg { width: 32px; height: 32px; }
  #file-input { display: none; }

  .modal-btns {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }
  .btn-cancel {
    background: transparent;
    border: 1px solid #555;
    color: var(--text-muted);
    padding: 0.55rem 1.2rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    transition: border-color 0.2s;
  }
  .btn-cancel:hover { border-color: var(--text-muted); }
  .btn-save {
    background: var(--gold);
    color: #1C1C1E;
    border: none;
    padding: 0.55rem 1.4rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    transition: background 0.2s;
  }
  .btn-save:hover { background: var(--gold-light); }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 2000;
    align-items: center;
    justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    border-radius: 8px;
    object-fit: contain;
  }
  .lightbox-close {
    position: absolute;
    top: 1.2rem; right: 1.5rem;
    font-size: 2rem;
    color: #fff;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .lightbox-close:hover { opacity: 1; }

  @media (max-width: 600px) {
    .grid { padding: 1rem; gap: 1rem; }
    header { padding: 2rem 1rem 1.5rem; }
    .toolbar { padding: 1rem 1rem 0; }
  }
</style>
</head>
<body>

<header>
  <p class="subtitle">Portafolio Profesional</p>
  <h1 id="portfolio-name">Mis Trabajos</h1>
</header>

<nav class="cats" id="cats-nav">
  <button class="cat-btn active" data-cat="Todos">Todos</button>
</nav>

<div class="toolbar">
  <button class="btn-add" onclick="openModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Agregar trabajo
  </button>
</div>

<div class="grid" id="grid">
  <div class="empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <p>Tu portafolio está vacío</p>
    <small>Hacé clic en "Agregar trabajo" para empezar</small>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2 id="modal-title">Nuevo trabajo</h2>

    <div class="field">
      <label>Foto</label>
      <div class="img-preview" id="img-preview" onclick="document.getElementById('file-input').click()">
        <div class="img-preview-label" id="img-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Hacé clic para subir una foto</span>
        </div>
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="handleFile(this)">
    </div>

    <div class="field">
      <label>Título del trabajo</label>
      <input type="text" id="inp-title" placeholder="Ej: Diseño de sala de estar">
    </div>

    <div class="field">
      <label>Categoría</label>
      <select id="inp-cat">
        <option value="">Seleccioná una categoría</option>
        <option>Diseño de Interiores</option>
        <option>Construcción</option>
        <option>Fotografía</option>
        <option>Arte</option>
        <option>Arquitectura</option>
        <option>Jardinería</option>
        <option>Remodelación</option>
        <option>Otro</option>
      </select>
    </div>

    <div class="field">
      <label>Descripción (opcional)</label>
      <textarea id="inp-desc" placeholder="Breve descripción del trabajo..."></textarea>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveWork()">Guardar</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  let works = JSON.parse(localStorage.getItem('portfolio-works') || '[]');
  let currentImg = null;
  let editIndex = null;
  let activeFilter = 'Todos';

  function save() {
    localStorage.setItem('portfolio-works', JSON.stringify(works));
  }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      currentImg = e.target.result;
      const preview = document.getElementById('img-preview');
      let img = preview.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        preview.appendChild(img);
      }
      img.src = currentImg;
      document.getElementById('img-label').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function openModal(index = null) {
    editIndex = index;
    currentImg = null;
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-cat').value = '';
    document.getElementById('inp-desc').value = '';
    const preview = document.getElementById('img-preview');
    const oldImg = preview.querySelector('img');
    if (oldImg) oldImg.remove();
    document.getElementById('img-label').style.display = 'flex';
    document.getElementById('file-input').value = '';

    if (index !== null) {
      const w = works[index];
      document.getElementById('modal-title').textContent = 'Editar trabajo';
      document.getElementById('inp-title').value = w.title;
      document.getElementById('inp-cat').value = w.cat;
      document.getElementById('inp-desc').value = w.desc;
      if (w.img) {
        currentImg = w.img;
        const img = document.createElement('img');
        img.src = w.img;
        preview.appendChild(img);
        document.getElementById('img-label').style.display = 'none';
      }
    } else {
      document.getElementById('modal-title').textContent = 'Nuevo trabajo';
    }
    document.getElementById('modal-bg').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-bg').classList.remove('open');
    editIndex = null;
  }

  function saveWork() {
    const title = document.getElementById('inp-title').value.trim();
    const cat = document.getElementById('inp-cat').value;
    const desc = document.getElementById('inp-desc').value.trim();
    if (!title) { alert('Por favor ingresá un título.'); return; }
    const entry = { title, cat: cat || 'Sin categoría', desc, img: currentImg || (editIndex !== null ? works[editIndex].img : null) };
    if (editIndex !== null) {
      works[editIndex] = entry;
    } else {
      works.push(entry);
    }
    save();
    closeModal();
    render();
  }

  function deleteWork(i) {
    if (!confirm('¿Eliminás este trabajo?')) return;
    works.splice(i, 1);
    save();
    render();
  }

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  function buildCats() {
    const cats = ['Todos', ...new Set(works.map(w => w.cat))];
    const nav = document.getElementById('cats-nav');
    nav.innerHTML = cats.map(c =>
      `<button class="cat-btn ${c === activeFilter ? 'active' : ''}" data-cat="${c}" onclick="filterBy('${c}')">${c}</button>`
    ).join('');
  }

  function filterBy(cat) {
    activeFilter = cat;
    render();
  }

  function render() {
    buildCats();
    const grid = document.getElementById('grid');
    const filtered = activeFilter === 'Todos' ? works : works.filter(w => w.cat === activeFilter);

    if (!filtered.length) {
      const msg = works.length ? 'No hay trabajos en esta categoría' : 'Tu portafolio está vacío';
      const sub = works.length ? '' : 'Hacé clic en "Agregar trabajo" para empezar';
      grid.innerHTML = `<div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>${msg}</p>${sub ? `<small>${sub}</small>` : ''}
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map((w, fi) => {
      const realIndex = works.indexOf(w);
      const imgHtml = w.img
        ? `<img src="${w.img}" alt="${w.title}" onclick="openLightbox('${w.img}')">
           <div class="card-overlay">
             <div class="overlay-icon">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
             </div>
           </div>`
        : `<div class="card-placeholder" onclick="openModal(${realIndex})">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
             <span>Clic para agregar foto</span>
           </div>`;
      return `
        <div class="card">
          <div class="card-img-wrap">${imgHtml}</div>
          <div class="card-body">
            <div class="card-cat">${w.cat}</div>
            <div class="card-title">${w.title}</div>
            ${w.desc ? `<div class="card-desc">${w.desc}</div>` : ''}
          </div>
          <div class="card-actions">
            <button class="btn-edit" onclick="openModal(${realIndex})">Editar</button>
            <button class="btn-delete" onclick="deleteWork(${realIndex})">Eliminar</button>
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('modal-bg').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  render();
</script>
</body>
</html>
